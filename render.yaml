services:
  - type: web
    name: golitransit-backend
    env: python
    region: oregon # Change as needed
    plan: standard
    
    # Build configuration
    buildCommand: cd backend && bash render-build.sh
    startCommand: cd backend && bash render-start.sh
    
    # Environment variables (set these in Render dashboard for sensitive values)
    envVars:
      - key: PORT
        value: 8000  # Will be overridden by Render's $PORT if needed
      - key: PYTHONUNBUFFERED
        value: 1
      - key: RENDER
        value: true
      # ── Azure SQL (MSSQL) — set in Render dashboard ────────────
      # Paste your full connection string as the value:
      # mssql+pyodbc://admin123:PASSWORD@versionlol.database.windows.net/hackathon
      #   ?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=yes&TrustServerCertificate=no
      - key: DATABASE_URL
        sync: false  # Secret — set value in Render dashboard, not here
      - key: JWT_SECRET_KEY
        sync: false  # Secret — set value in Render dashboard
      - key: ML_PREDICTION_URL
        value: https://your-ml-service.onrender.com/predict
    
    # Health check
    healthCheckPath: /health
    healthCheckTimeout: 30  # Allow more time for startup
    
    # Auto-restart on failure
    autoDeploy: true
    
    # Autoscale (optional - disable for hackathon to save costs)
    autoscaling:
      enabled: false
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 75
    
    # Disk requirements (for caching OSM graph data)
    disk:
      name: osm-cache
      mountPath: /app/backend/cache
      sizeGB: 5

# databases: section removed.
# Azure SQL (MSSQL) is used as the external managed database.
# No Render-managed database is needed.
# Configure DATABASE_URL in the Render dashboard under Environment Variables.
