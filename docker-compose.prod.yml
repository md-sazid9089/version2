# ============================================================
# GoliTransit — Docker Compose Production Override
# ============================================================
# Overrides for production deployment:
#   - No live-reload bind mounts
#   - Frontend uses Nginx production target (port 80)
#   - No --reload flag on uvicorn
#   - Resource limits
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================================

version: "3.9"

services:

  # ─── Backend (production overrides) ────────────────────────
  backend:
    volumes:
      - ./config.json:/app/config.json:ro
      - osm-cache:/app/data/osm_cache
    # Remove --reload for production
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # ─── ML Service (production overrides) ─────────────────────
  ml:
    volumes:
      - ./config.json:/app/config.json:ro
      - ml-models:/app/models
      - ml-data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  # ─── Frontend (Nginx production target) ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "80:80"
    volumes: []  # No bind mounts in production
    command: []  # Use Nginx default CMD from Dockerfile

  # ─── MySQL Database (production overrides) ─────────────────
  mysql:
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
